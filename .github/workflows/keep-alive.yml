name: Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"   # a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente se quiser testar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Beauty Clinic
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://beauty-clinic-beige.vercel.app/api/ping --max-time 15)
          echo "Status HTTP: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Ping retornou $STATUS — verificar deploy"
            exit 1
          fi
          echo "✅ Sistema respondendo"
